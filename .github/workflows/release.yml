name: Release desktop apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS release artifacts
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build arm64 and x86_64 macOS packages
        run: ./script/package_release.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            release/porkn-macos-arm64.zip
            release/porkn-macos-x86_64.zip
            release/SHA256SUMS.txt

  windows:
    name: Build Windows release artifact
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows x64 package
        shell: pwsh
        run: ./apps/windows/scripts/package.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/windows/porkn-windows-x64.zip
            release/windows/SHA256SUMS-windows.txt

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [macos, windows]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-upload

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-upload/release-macos/porkn-macos-arm64.zip
            release-upload/release-macos/porkn-macos-x86_64.zip
            release-upload/release-macos/SHA256SUMS.txt
            release-upload/release-windows/porkn-windows-x64.zip
            release-upload/release-windows/SHA256SUMS-windows.txt
